<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Endless Script Lab</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>Endless Script Lab</h1>
        <p>Type `1+1` for a quick result, or use simple Endless-flavoured function code where `spell` makes a function, `warp` calls it, and `loot` returns a value.</p>
      </div>
      <div class="actions">
        <button id="load-sample" type="button">Load sample</button>
        <button id="run-spellbook" type="button">Run code</button>
      </div>
    </header>

    <main class="workspace">
      <section class="panel tree-panel">
        <div class="panel-heading">
          <h2>Function Map</h2>
          <p>`spell` creates nodes. `warp` creates links.</p>
        </div>
        <div id="tree"></div>
        <div class="spell-card">
          <h3 id="selected-spell">No spell selected</h3>
          <p id="selected-summary">Start typing to build the map.</p>
        </div>
      </section>
